name: Cypress release tests

on:
  push:

# Cancel in-progress runs when a new run is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Wait for Vercel deployment to complete before running tests
  wait-for-vercel-deployment:
    name: Wait for vercel deployment
    runs-on: ubuntu-24.04
    outputs:
      preview_url: ${{ steps.waitForVercelDeployment.outputs.url }}
    steps:
      - name: Wait for Vercel deployment
        id: waitForVercelDeployment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
        run: |
          COMMIT_SHA="${GITHUB_SHA}"
          MAX_ATTEMPTS=50
          INTERVAL=20

          echo "Waiting for Vercel deployment for commit ${COMMIT_SHA}..."

          for i in $(seq 1 $MAX_ATTEMPTS); do
            RESPONSE=$(curl -s -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              "https://api.vercel.com/v6/deployments?projectId=${VERCEL_PROJECT_ID}&teamId=${VERCEL_TEAM_ID}&sha=${COMMIT_SHA}&limit=1")
            STATE=$(echo "$RESPONSE" | jq -r '.deployments[0].state // empty')
            DEPLOYMENT_ID=$(echo "$RESPONSE" | jq -r '.deployments[0].uid // empty')

            if [ "$STATE" = "READY" ] && [ -n "$DEPLOYMENT_ID" ]; then
              # Prefer the branch alias (readable in test logs) over the unique URL.
              URL=$(curl -s -H "Authorization: Bearer ${VERCEL_TOKEN}" \
                "https://api.vercel.com/v13/deployments/${DEPLOYMENT_ID}?teamId=${VERCEL_TEAM_ID}" \
                | jq -r '[.alias[]? | select(contains("-git-"))][0] // .url')
              echo "url=https://${URL}" >> "$GITHUB_OUTPUT"
              echo "Deployment ready: https://${URL}"
              exit 0
            fi

            echo "Attempt ${i}/${MAX_ATTEMPTS}: state=${STATE:-not found}, waiting ${INTERVAL}s..."
            sleep $INTERVAL
          done

          echo "::error::Timed out waiting for Vercel deployment"
          exit 1

  # Parallel test execution using matrix strategy
  cypress-run:
    name: Cypress E2E Tests - ${{ matrix.group.name }}
    needs: wait-for-vercel-deployment
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      checks: write
      deployments: read
    strategy:
      fail-fast: false # Don't cancel other jobs if one fails
      matrix:
        group:
          - name: 'Auth flows'
            spec: 'cypress/integration/auth/**/*.cy.tsx'
          - name: 'User account flows'
            spec: 'cypress/integration/user-accounts/**/*.cy.tsx'
          - name: 'User content flows'
            spec: 'cypress/integration/user-content/**/*.cy.tsx'
          - name: 'Partner user flows'
            spec: 'cypress/integration/partners/**/*.cy.tsx'
          - name: 'Admin flows'
            spec: 'cypress/integration/admin/**/*.cy.tsx'
          - name: 'System flows'
            spec: 'cypress/integration/system/**/*.cy.tsx'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: 'yarn'

      # Cache Cypress binary to speed up installation (~500MB, saves 1-2 min per job)
      - name: Cache Cypress binary
        uses: actions/cache@v5
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            cypress-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run Cypress tests
        uses: cypress-io/github-action@v7.1.9
        with:
          install: false # Already installed above
          browser: chrome
          config-file: cypress.config.ts
          headed: false
          record: true
          parallel: true # Enable Cypress Dashboard parallelization
          group: ${{ matrix.group.name }}
          spec: ${{ matrix.group.spec }}
          ci-build-id: ${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
        env:
          NEXT_PUBLIC_ROLLBAR_ENV: CI
          NEXT_PUBLIC_VERCEL_GIT_COMMIT_SHA: ci
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_ROLLBAR_CLIENT_TOKEN: ${{ secrets.NEXT_PUBLIC_ROLLBAR_CLIENT_TOKEN }}
          NEXT_PUBLIC_STORYBLOK_TOKEN: ${{ secrets.NEXT_PUBLIC_STORYBLOK_TOKEN }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_GOOGLE_ANALYTICS_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_ANALYTICS_ID }}
          CYPRESS_PROJECT_ID: ${{ secrets.CYPRESS_PROJECT_ID }}
          CYPRESS_BASE_URL: ${{ needs.wait-for-vercel-deployment.outputs.preview_url }}
          CYPRESS_MAIL_SLURP_API_KEY: ${{secrets.CYPRESS_MAIL_SLURP_API_KEY}}
          CYPRESS_INBOX_ID: ${{secrets.CYPRESS_INBOX_ID}}
          CYPRESS_SUPER_ADMIN_EMAIL: ${{secrets.CYPRESS_SUPER_ADMIN_EMAIL}}
          CYPRESS_SUPER_ADMIN_PASSWORD: ${{secrets.CYPRESS_SUPER_ADMIN_PASSWORD}}
          CYPRESS_BUMBLE_PARTNER_ADMIN_EMAIL: ${{secrets.CYPRESS_BUMBLE_ADMIN_EMAIL}}
          CYPRESS_BUMBLE_PARTNER_ADMIN_PASSWORD: ${{secrets.CYPRESS_BUMBLE_ADMIN_PASSWORD}}
          CYPRESS_BADOO_PARTNER_ADMIN_EMAIL: ${{secrets.CYPRESS_BADOO_ADMIN_EMAIL}}
          CYPRESS_BADOO_PARTNER_ADMIN_PASSWORD: ${{secrets.CYPRESS_BADOO_ADMIN_PASSWORD}}
          CYPRESS_PUBLIC_EMAIL: ${{secrets.CYPRESS_PUBLIC_EMAIL}}
          CYPRESS_PUBLIC_PASSWORD: ${{secrets.CYPRESS_PUBLIC_PASSWORD}}
          CYPRESS_PUBLIC_NAME: ${{secrets.CYPRESS_PUBLIC_NAME}}
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          CYPRESS_CI_FIREWALL_BYPASS: ${{ secrets.CI_FIREWALL_BYPASS }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload artifacts only on failure to reduce log size
      - name: Upload screenshots (on failure)
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: cypress-screenshots-${{ matrix.group.name }}
          path: cypress/screenshots
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload videos (on failure)
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: cypress-videos-${{ matrix.group.name }}
          path: cypress/videos
          if-no-files-found: ignore
          retention-days: 7

  # Separate job to catch any ungrouped tests
  check-ungrouped:
    name: Check for ungrouped tests
    needs: wait-for-vercel-deployment
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check for ungrouped test files
        id: check
        run: |
          if ls cypress/integration/*.cy.{tsx,ts,jsx,js} 1> /dev/null 2>&1; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "⚠️  Found ungrouped tests - they should be organized into folders"
            ls cypress/integration/*.cy.{tsx,ts,jsx,js} 2>/dev/null || true
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "✅ No ungrouped tests found"
          fi

      - name: Run ungrouped tests (if any)
        if: steps.check.outputs.found == 'true'
        uses: cypress-io/github-action@v7.1.9
        with:
          browser: chrome
          config-file: cypress.config.ts
          headed: false
          record: true
          parallel: true
          group: 'Ungrouped Tests'
          spec: 'cypress/integration/*.cy.tsx'
          ci-build-id: ${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
        env:
          NEXT_PUBLIC_ROLLBAR_ENV: CI
          NEXT_PUBLIC_VERCEL_GIT_COMMIT_SHA: ci
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_ROLLBAR_CLIENT_TOKEN: ${{ secrets.NEXT_PUBLIC_ROLLBAR_CLIENT_TOKEN }}
          NEXT_PUBLIC_STORYBLOK_TOKEN: ${{ secrets.NEXT_PUBLIC_STORYBLOK_TOKEN }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_GOOGLE_ANALYTICS_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_ANALYTICS_ID }}
          CYPRESS_PROJECT_ID: ${{ secrets.CYPRESS_PROJECT_ID }}
          CYPRESS_BASE_URL: ${{ needs.wait-for-vercel-deployment.outputs.preview_url }}
          CYPRESS_MAIL_SLURP_API_KEY: ${{secrets.CYPRESS_MAIL_SLURP_API_KEY}}
          CYPRESS_INBOX_ID: ${{secrets.CYPRESS_INBOX_ID}}
          CYPRESS_SUPER_ADMIN_EMAIL: ${{secrets.CYPRESS_SUPER_ADMIN_EMAIL}}
          CYPRESS_SUPER_ADMIN_PASSWORD: ${{secrets.CYPRESS_SUPER_ADMIN_PASSWORD}}
          CYPRESS_BUMBLE_PARTNER_ADMIN_EMAIL: ${{secrets.CYPRESS_BUMBLE_ADMIN_EMAIL}}
          CYPRESS_BUMBLE_PARTNER_ADMIN_PASSWORD: ${{secrets.CYPRESS_BUMBLE_ADMIN_PASSWORD}}
          CYPRESS_BADOO_PARTNER_ADMIN_EMAIL: ${{secrets.CYPRESS_BADOO_ADMIN_EMAIL}}
          CYPRESS_BADOO_PARTNER_ADMIN_PASSWORD: ${{secrets.CYPRESS_BADOO_ADMIN_PASSWORD}}
          CYPRESS_PUBLIC_EMAIL: ${{secrets.CYPRESS_PUBLIC_EMAIL}}
          CYPRESS_PUBLIC_PASSWORD: ${{secrets.CYPRESS_PUBLIC_PASSWORD}}
          CYPRESS_PUBLIC_NAME: ${{secrets.CYPRESS_PUBLIC_NAME}}
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          CYPRESS_CI_FIREWALL_BYPASS: ${{ secrets.CI_FIREWALL_BYPASS }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
